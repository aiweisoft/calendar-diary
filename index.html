<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 700px) {
            .main {
                grid-template-columns: 1fr;
            }
        }
        .calendar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header h2 {
            font-size: 1.2rem;
            color: #333;
        }
        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .calendar-header button:hover {
            background: #5568d3;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
        }
        .weekdays div {
            color: #999;
            font-size: 12px;
            padding: 8px 0;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .days div {
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }
        .days div:hover:not(.empty) {
            background: #f0f0f0;
        }
        .days div.today {
            background: #667eea;
            color: white;
        }
        .days div.selected {
            background: #ff6b6b !important;
            color: white !important;
        }
        .days div.has-diary {
            position: relative;
        }
        .days div.has-diary::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #764ba2;
            border-radius: 50%;
        }
        .days div.selected.has-diary::after {
            background: white;
        }
        .empty {
            cursor: default;
        }
        .diary-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .diary-panel h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }
        .diary-date {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .diary-content {
            width: 100%;
            height: 200px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            line-height: 1.6;
        }
        .diary-content:focus {
            outline: none;
            border-color: #667eea;
        }
        .save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            width: 100%;
        }
        .save-btn:hover {
            background: #5568d3;
        }
        .save-btn.secondary {
            background: #fff;
            color: #667eea;
            border: 1px solid #667eea;
            margin-right: 10px;
        }
        .save-btn.secondary:hover {
            background: #f0f0ff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .button-row .save-btn {
            flex: 1;
            margin-top: 0;
        }
        .diary-list {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .diary-list h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }
        .diary-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .diary-item:last-child {
            border-bottom: none;
        }
        .diary-item:hover {
            background: #f9f9f9;
        }
        .diary-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .diary-item-date {
            font-weight: bold;
            color: #333;
        }
        .diary-item-time {
            color: #999;
            font-size: 12px;
        }
        .diary-item-preview {
            color: #666;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .diary-item-delete {
            color: #ff6b6b;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
        }
        .diary-item-delete:hover {
            background: #ffeaea;
            border-radius: 4px;
        }
        .day-diaries {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .day-diary-item {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .day-diary-item:last-child {
            border-bottom: none;
        }
        .day-diary-item:hover {
            background: #f9f9f9;
        }
        .day-diary-item.selected {
            background: #f0f0ff;
        }
        .day-diary-time {
            color: #999;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .day-diary-preview {
            color: #666;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .no-diary {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📔 日历日记</h1>
            <p>记录每一天的美好</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="write">写日记</button>
            <button class="tab-btn" data-tab="list">日记列表</button>
        </div>

        <div id="write-tab" class="tab-content active">
            <div class="main">
                <div class="calendar">
                    <div class="calendar-header">
                        <button id="prevMonth">◀</button>
                        <h2 id="currentMonth">2024年1月</h2>
                        <button id="nextMonth">▶</button>
                    </div>
                    <div class="weekdays">
                        <div>日</div>
                        <div>一</div>
                        <div>二</div>
                        <div>三</div>
                        <div>四</div>
                        <div>五</div>
                        <div>六</div>
                    </div>
                    <div class="days" id="days"></div>
                </div>
                <div class="diary-panel">
                    <h2>日记内容</h2>
                    <div class="diary-date" id="diaryDate">请选择一个日期</div>
                    <div class="button-row">
                        <button class="save-btn secondary" id="newDiaryBtn">新建日记</button>
                        <button class="save-btn" id="saveBtn">保存日记</button>
                    </div>
                    <textarea class="diary-content" id="diaryContent" placeholder="在这里写下今天的日记..."></textarea>
                    <div id="dayDiariesContainer"></div>
                </div>
            </div>
        </div>

        <div id="list-tab" class="tab-content">
            <div class="diary-list">
                <h2>我的日记</h2>
                <div id="diaryListContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = null;
        let selectedDiaryId = null;
        
        function migrateData() {
            const oldData = localStorage.getItem('diaryData');
            if (oldData) {
                try {
                    const parsed = JSON.parse(oldData);
                    const newData = {};
                    for (const dateStr in parsed) {
                        const content = parsed[dateStr];
                        if (typeof content === 'string') {
                            newData[dateStr] = [{
                                id: Date.now() + Math.random(),
                                time: new Date().toISOString(),
                                content: content
                            }];
                        } else {
                            newData[dateStr] = content;
                        }
                    }
                    localStorage.setItem('diaryData', JSON.stringify(newData));
                } catch (e) {}
            }
        }
        migrateData();
        
        let diaryData = JSON.parse(localStorage.getItem('diaryData') || '{}');

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
                if (btn.dataset.tab === 'list') {
                    renderDiaryList();
                }
            });
        });

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            const daysContainer = document.getElementById('days');
            daysContainer.innerHTML = '';
            
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                daysContainer.appendChild(empty);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEl = document.createElement('div');
                dayEl.textContent = day;
                
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    dayEl.className = 'today';
                }
                
                if (diaryData[dateStr] && diaryData[dateStr].length > 0) {
                    dayEl.classList.add('has-diary');
                }
                
                dayEl.addEventListener('click', () => selectDate(dateStr, dayEl));
                daysContainer.appendChild(dayEl);
            }
        }

        function selectDate(dateStr, element) {
            document.querySelectorAll('.days div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
            
            selectedDate = dateStr;
            selectedDiaryId = null;
            document.getElementById('diaryDate').textContent = formatDate(dateStr);
            renderDayDiaries();
        }
        
        function renderDayDiaries() {
            const container = document.getElementById('dayDiariesContainer');
            const diaries = diaryData[selectedDate] || [];
            
            if (diaries.length === 0) {
                container.innerHTML = '';
                document.getElementById('diaryContent').value = '';
                return;
            }
            
            container.innerHTML = `
                <div class="day-diaries">
                    ${diaries.map(d => `
                        <div class="day-diary-item ${selectedDiaryId === d.id ? 'selected' : ''}" onclick="selectDayDiary('${d.id}')">
                            <div class="day-diary-time">${formatTime(d.time)}</div>
                            <div class="day-diary-preview">${d.content.substring(0, 30)}${d.content.length > 30 ? '...' : ''}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function selectDayDiary(id) {
            selectedDiaryId = id;
            const diaries = diaryData[selectedDate] || [];
            const diary = diaries.find(d => d.id == id);
            if (diary) {
                document.getElementById('diaryContent').value = diary.content;
            }
            renderDayDiaries();
        }
        
        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${year}年${parseInt(month)}月${parseInt(day)}日`;
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }
        
        function saveDiary() {
            if (!selectedDate) {
                alert('请先选择一个日期');
                return;
            }
            
            const content = document.getElementById('diaryContent').value;
            if (!content.trim()) {
                alert('请输入日记内容');
                return;
            }
            
            if (!diaryData[selectedDate]) {
                diaryData[selectedDate] = [];
            }
            
            if (selectedDiaryId) {
                const diaries = diaryData[selectedDate];
                const index = diaries.findIndex(d => d.id == selectedDiaryId);
                if (index !== -1) {
                    diaries[index].content = content;
                }
            } else {
                diaryData[selectedDate].push({
                    id: Date.now() + Math.random(),
                    time: new Date().toISOString(),
                    content: content
                });
            }
            
            localStorage.setItem('diaryData', JSON.stringify(diaryData));
            
            renderCalendar();
            renderDayDiaries();
            alert('日记已保存！');
        }

        function renderDiaryList() {
            const container = document.getElementById('diaryListContainer');
            const allDiaries = [];
            
            for (const dateStr in diaryData) {
                if (diaryData[dateStr] && diaryData[dateStr].length > 0) {
                    diaryData[dateStr].forEach(d => {
                        allDiaries.push({ dateStr, ...d });
                    });
                }
            }
            
            allDiaries.sort((a, b) => new Date(b.time) - new Date(a.time));
            
            if (allDiaries.length === 0) {
                container.innerHTML = '<div class="no-diary">还没有日记，快去写第一篇吧！</div>';
                return;
            }
            
            container.innerHTML = allDiaries.map(d => `
                <div class="diary-item" onclick="goToDate('${d.dateStr}', '${d.id}')">
                    <div class="diary-item-header">
                        <span class="diary-item-date">${formatDate(d.dateStr)}</span>
                        <span class="diary-item-delete" onclick="event.stopPropagation(); deleteDiary('${d.dateStr}', '${d.id}')">删除</span>
                    </div>
                    <div class="diary-item-time">${formatTime(d.time)}</div>
                    <div class="diary-item-preview">${d.content.substring(0, 50)}${d.content.length > 50 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        function goToDate(dateStr, diaryId) {
            const [year, month, day] = dateStr.split('-');
            currentDate = new Date(year, month - 1, day);
            selectedDate = dateStr;
            selectedDiaryId = diaryId;
            
            document.querySelectorAll('.tab-btn')[0].click();
            renderCalendar();
            
            setTimeout(() => {
                const days = document.querySelectorAll('.days div');
                days.forEach(d => {
                    if (d.textContent == day && !d.classList.contains('empty')) {
                        d.classList.add('selected');
                    }
                });
                renderDayDiaries();
                const diaries = diaryData[dateStr] || [];
                const diary = diaries.find(d => d.id == diaryId);
                if (diary) {
                    document.getElementById('diaryContent').value = diary.content;
                }
            }, 100);
            
            document.getElementById('diaryDate').textContent = formatDate(dateStr);
        }

        function deleteDiary(dateStr, diaryId) {
            if (confirm('确定要删除这篇日记吗？')) {
                const diaries = diaryData[dateStr];
                const newDiaries = diaries.filter(d => d.id != diaryId);
                if (newDiaries.length === 0) {
                    delete diaryData[dateStr];
                } else {
                    diaryData[dateStr] = newDiaries;
                }
                localStorage.setItem('diaryData', JSON.stringify(diaryData));
                renderDiaryList();
                renderCalendar();
                if (selectedDate === dateStr) {
                    selectedDiaryId = null;
                    renderDayDiaries();
                }
            }
        }
        
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        
        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        
        document.getElementById('saveBtn').addEventListener('click', saveDiary);
        
        document.getElementById('newDiaryBtn').addEventListener('click', () => {
            if (!selectedDate) {
                alert('请先选择一个日期');
                return;
            }
            selectedDiaryId = null;
            document.getElementById('diaryContent').value = '';
            renderDayDiaries();
            document.getElementById('diaryContent').focus();
        });
        
        renderCalendar();
    </script>
</body>
</html>
