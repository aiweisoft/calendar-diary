<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            position: relative;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .sync-btn {
            position: absolute;
            right: 0;
            top: 8px;
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sync-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }
        .sync-btn.syncing {
            opacity: 0.7;
            cursor: wait;
            animation: pulse 1s infinite;
        }
        .sync-btn svg {
            width: 12px;
            height: 12px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.4; }
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
            flex: 1;
            max-width: 200px;
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .right-panels {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .right-panels .diary-panel {
            width: 100%;
        }
        .calendar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header h2 {
            font-size: 1.2rem;
            color: #333;
        }
        .calendar-header-right {
            display: flex;
            gap: 8px;
        }
        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .calendar-header button:hover {
            background: #5568d3;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
        }
        .weekdays div {
            color: #999;
            font-size: 12px;
            padding: 8px 0;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .days div {
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }
        .days div:hover:not(.empty) {
            background: #f0f0f0;
        }
        .days div.today {
            background: #667eea;
            color: white;
        }
        .days div.selected {
            background: #ff6b6b !important;
            color: white !important;
        }
        .days div.has-diary {
            position: relative;
        }
        .days div.has-diary::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #764ba2;
            border-radius: 50%;
        }
        .days div.selected.has-diary::after {
            background: white;
        }
        .empty {
            cursor: default;
        }
        .diary-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .diary-panel h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }
        .diary-date {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .diary-content {
            width: 100%;
            height: 150px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            line-height: 1.6;
        }
        .diary-content:focus {
            outline: none;
            border-color: #667eea;
        }
        .save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            width: 100%;
        }
        .save-btn:hover {
            background: #5568d3;
        }
        .save-btn.secondary {
            background: #fff;
            color: #667eea;
            border: 1px solid #667eea;
            margin-right: 10px;
        }
        .save-btn.secondary:hover {
            background: #f0f0ff;
        }
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .button-row .save-btn {
            flex: 1;
            margin-top: 0;
        }
        .diary-list {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .diary-list h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }
        .diary-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .diary-item:last-child {
            border-bottom: none;
        }
        .diary-item:hover {
            background: #f9f9f9;
        }
        .diary-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .diary-item-date {
            font-weight: bold;
            color: #333;
        }
        .diary-item-time {
            color: #999;
            font-size: 12px;
        }
        .diary-item-preview {
            color: #666;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .diary-item-delete {
            color: #ff6b6b;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
        }
        .diary-item-delete:hover {
            background: #ffeaea;
            border-radius: 4px;
        }
        .day-diaries {
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .day-diary-item {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .day-diary-item:last-child {
            border-bottom: none;
        }
        .day-diary-item:hover {
            background: #f9f9f9;
        }
        .day-diary-item.selected {
            background: #f0f0ff;
        }
        .day-diary-time {
            color: #999;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .day-diary-preview {
            color: #666;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .day-diary-delete {
            float: right;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 6px;
        }
        .day-diary-delete:hover {
            background: #ffeaea;
            border-radius: 4px;
        }
        .no-diary {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .modal h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .modal input:focus {
            outline: none;
            border-color: #667eea;
        }
        .modal .hint {
            color: #999;
            font-size: 12px;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .modal .hint a {
            color: #667eea;
            text-decoration: none;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-buttons .cancel-btn {
            background: #f0f0f0;
            border: none;
            color: #666;
        }
        .modal-buttons .confirm-btn {
            background: #667eea;
            border: none;
            color: white;
        }
        .sync-status {
            position: absolute;
            right: 0;
            top: 38px;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
        }
        .sync-status.success {
            background: rgba(76, 175, 80, 0.9);
            color: white;
        }
        .sync-status.error {
            background: rgba(255, 107, 107, 0.9);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📔 日历日记</h1>
            <button class="sync-btn" id="syncBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                同步
            </button>
            <div class="sync-status" id="syncStatus"></div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="write">写日记</button>
            <button class="tab-btn" data-tab="list">日记列表</button>
        </div>

        <div id="write-tab" class="tab-content active">
            <div class="right-panels">
                <div class="calendar">
                    <div class="calendar-header">
                        <button id="prevMonth">◀</button>
                        <h2 id="currentMonth">2024年1月</h2>
                        <div class="calendar-header-right">
                            <button id="goToday">今天</button>
                            <button id="nextMonth">▶</button>
                        </div>
                    </div>
                    <div class="weekdays">
                        <div>日</div>
                        <div>一</div>
                        <div>二</div>
                        <div>三</div>
                        <div>四</div>
                        <div>五</div>
                        <div>六</div>
                    </div>
                    <div class="days" id="days"></div>
                </div>
                <div class="diary-panel">
                    <h2>日记内容</h2>
                    <div class="diary-date" id="diaryDate">请选择一个日期</div>
                    <div class="button-row">
                        <button class="save-btn secondary" id="newDiaryBtn">新建日记</button>
                        <button class="save-btn" id="saveBtn">保存日记</button>
                    </div>
                    <textarea class="diary-content" id="diaryContent" placeholder="在这里写下今天的日记..."></textarea>
                </div>
                <div class="diary-panel">
                    <h2>当天日记</h2>
                    <div id="dayDiariesContainer"></div>
                </div>
            </div>
        </div>

        <div id="list-tab" class="tab-content">
            <div class="diary-list">
                <h2>我的日记</h2>
                <div id="diaryListContainer"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>设置GitHub同步</h3>
            <div class="hint">
                需要GitHub Personal Access Token，权限勾选 <strong>gist</strong>。<br>
                <a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank">创建Token</a>
            </div>
            <input type="password" id="tokenInput" placeholder="输入GitHub Token">
            <input type="text" id="gistIdInput" placeholder="Gist ID（已有则填，没有则留空）">
            <div class="modal-buttons">
                <button class="cancel-btn" id="cancelSync">取消</button>
                <button class="confirm-btn" id="confirmSync">保存并同步</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = null;
        let selectedDiaryId = null;
        
        const GIST_FILENAME = 'diary-data.json';
        
        function getSyncConfig() {
            return {
                token: localStorage.getItem('github_token'),
                gistId: localStorage.getItem('github_gist_id')
            };
        }
        
        function setSyncConfig(token, gistId) {
            localStorage.setItem('github_token', token);
            localStorage.setItem('github_gist_id', gistId);
        }
        
        async function syncToGist() {
            const { token, gistId } = getSyncConfig();
            if (!token) return null;
            
            const data = JSON.stringify(diaryData);
            const url = gistId 
                ? `https://api.github.com/gists/${gistId}`
                : 'https://api.github.com/gists';
            
            const body = gistId 
                ? JSON.stringify({
                    description: '日历日记数据',
                    files: { [GIST_FILENAME]: { content: data } }
                })
                : JSON.stringify({
                    description: '日历日记数据',
                    public: false,
                    files: { [GIST_FILENAME]: { content: data } }
                });
            
            const response = await fetch(url, {
                method: gistId ? 'PATCH' : 'POST',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: body
            });
            
            if (!response.ok) {
                throw new Error('上传失败');
            }
            
            const result = await response.json();
            if (!gistId) {
                setSyncConfig(token, result.id);
                document.getElementById('gistIdInput').value = result.id;
            }
            return result;
        }
        
        async function syncFromGist() {
            const { token, gistId } = getSyncConfig();
            if (!token || !gistId) return null;
            
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: {
                    'Authorization': `token ${token}`
                }
            });
            
            if (!response.ok) {
                throw new Error('下载失败');
            }
            
            const result = await response.json();
            const content = result.files[GIST_FILENAME]?.content;
            if (content) {
                return JSON.parse(content);
            }
            return null;
        }
        
        async function syncData() {
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('syncStatus');
            const { token, gistId } = getSyncConfig();
            
            if (!token) {
                document.getElementById('modalOverlay').classList.add('show');
                return;
            }
            
            btn.classList.add('syncing');
            btn.textContent = '同步中...';
            status.textContent = '';
            status.className = 'sync-status';
            
            try {
                const remoteData = await syncFromGist();
                
                if (remoteData) {
                    const localJson = JSON.stringify(diaryData);
                    const remoteJson = JSON.stringify(remoteData);
                    
                    if (localJson !== remoteJson) {
                        if (confirm('云端有更新，是否下载？')) {
                            diaryData = remoteData;
                            localStorage.setItem('diaryData', remoteJson);
                            renderCalendar();
                            if (selectedDate) {
                                renderDayDiaries();
                            }
                        }
                    }
                }
                
                await syncToGist();
                status.textContent = '✓ 同步成功';
                status.classList.add('success');
            } catch (e) {
                status.textContent = '✗ 同步失败: ' + e.message;
                status.classList.add('error');
            } finally {
                btn.classList.remove('syncing');
                btn.textContent = '☁️ 同步';
            }
        }
        
        document.getElementById('syncBtn').addEventListener('click', syncData);
        
        document.getElementById('cancelSync').addEventListener('click', () => {
            document.getElementById('modalOverlay').classList.remove('show');
        });
        
        document.getElementById('confirmSync').addEventListener('click', async () => {
            const token = document.getElementById('tokenInput').value.trim();
            const gistId = document.getElementById('gistIdInput').value.trim();
            
            if (!token) {
                alert('请输入GitHub Token');
                return;
            }
            
            setSyncConfig(token, gistId);
            document.getElementById('modalOverlay').classList.remove('show');
            
            await syncData();
        });

        function migrateData() {
            const oldData = localStorage.getItem('diaryData');
            if (oldData) {
                try {
                    const parsed = JSON.parse(oldData);
                    const newData = {};
                    for (const dateStr in parsed) {
                        const content = parsed[dateStr];
                        if (typeof content === 'string') {
                            newData[dateStr] = [{
                                id: Date.now() + Math.random(),
                                time: new Date().toISOString(),
                                content: content
                            }];
                        } else {
                            newData[dateStr] = content;
                        }
                    }
                    localStorage.setItem('diaryData', JSON.stringify(newData));
                } catch (e) {}
            }
        }
        migrateData();
        
        let diaryData = JSON.parse(localStorage.getItem('diaryData') || '{}');

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
                if (btn.dataset.tab === 'list') {
                    renderDiaryList();
                }
            });
        });

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            const daysContainer = document.getElementById('days');
            daysContainer.innerHTML = '';
            
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                daysContainer.appendChild(empty);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEl = document.createElement('div');
                dayEl.textContent = day;
                
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    dayEl.className = 'today';
                }
                
                if (diaryData[dateStr] && diaryData[dateStr].length > 0) {
                    dayEl.classList.add('has-diary');
                }
                
                dayEl.addEventListener('click', () => selectDate(dateStr, dayEl));
                daysContainer.appendChild(dayEl);
            }
        }

        function selectDate(dateStr, element) {
            document.querySelectorAll('.days div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
            
            selectedDate = dateStr;
            selectedDiaryId = null;
            document.getElementById('diaryDate').textContent = formatDate(dateStr);
            renderDayDiaries();
        }
        
        function renderDayDiaries() {
            const container = document.getElementById('dayDiariesContainer');
            const diaries = diaryData[selectedDate] || [];
            
            if (diaries.length === 0) {
                container.innerHTML = '';
                document.getElementById('diaryContent').value = '';
                return;
            }
            
            container.innerHTML = `
                <div class="day-diaries">
                    ${diaries.map(d => `
                        <div class="day-diary-item ${selectedDiaryId === d.id ? 'selected' : ''}" onclick="selectDayDiary('${d.id}')">
                            <span class="day-diary-delete" onclick="event.stopPropagation(); deleteDayDiary('${d.id}')">删除</span>
                            <div class="day-diary-time">${formatTime(d.time)}</div>
                            <div class="day-diary-preview">${d.content.substring(0, 30)}${d.content.length > 30 ? '...' : ''}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function selectDayDiary(id) {
            selectedDiaryId = id;
            const diaries = diaryData[selectedDate] || [];
            const diary = diaries.find(d => d.id == id);
            if (diary) {
                document.getElementById('diaryContent').value = diary.content;
            }
            renderDayDiaries();
        }
        
        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${year}年${parseInt(month)}月${parseInt(day)}日`;
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }
        
        function saveDiary() {
            if (!selectedDate) {
                alert('请先选择一个日期');
                return;
            }
            
            const content = document.getElementById('diaryContent').value;
            if (!content.trim()) {
                alert('请输入日记内容');
                return;
            }
            
            if (!diaryData[selectedDate]) {
                diaryData[selectedDate] = [];
            }
            
            if (selectedDiaryId) {
                const diaries = diaryData[selectedDate];
                const index = diaries.findIndex(d => d.id == selectedDiaryId);
                if (index !== -1) {
                    diaries[index].content = content;
                }
            } else {
                diaryData[selectedDate].push({
                    id: Date.now() + Math.random(),
                    time: new Date().toISOString(),
                    content: content
                });
            }
            
            localStorage.setItem('diaryData', JSON.stringify(diaryData));
            
            renderCalendar();
            renderDayDiaries();
            alert('日记已保存！');
        }

        function renderDiaryList() {
            const container = document.getElementById('diaryListContainer');
            const allDiaries = [];
            
            for (const dateStr in diaryData) {
                if (diaryData[dateStr] && diaryData[dateStr].length > 0) {
                    diaryData[dateStr].forEach(d => {
                        allDiaries.push({ dateStr, ...d });
                    });
                }
            }
            
            allDiaries.sort((a, b) => new Date(a.time) - new Date(b.time));
            
            if (allDiaries.length === 0) {
                container.innerHTML = '<div class="no-diary">还没有日记，快去写第一篇吧！</div>';
                return;
            }
            
            container.innerHTML = allDiaries.map(d => `
                <div class="diary-item" onclick="goToDate('${d.dateStr}', '${d.id}')">
                    <div class="diary-item-header">
                        <span class="diary-item-date">${formatDate(d.dateStr)} <span class="diary-item-time">${formatTime(d.time)}</span></span>
                        <span class="diary-item-delete" onclick="event.stopPropagation(); deleteDiary('${d.dateStr}', '${d.id}')">删除</span>
                    </div>
                    <div class="diary-item-preview">${d.content.substring(0, 50)}${d.content.length > 50 ? '...' : ''}</div>
                </div>
            `).join('');
        }

        function goToDate(dateStr, diaryId) {
            const [year, month, day] = dateStr.split('-');
            currentDate = new Date(year, month - 1, day);
            selectedDate = dateStr;
            selectedDiaryId = diaryId;
            
            document.querySelectorAll('.tab-btn')[0].click();
            renderCalendar();
            
            setTimeout(() => {
                const days = document.querySelectorAll('.days div');
                days.forEach(d => {
                    if (d.textContent == day && !d.classList.contains('empty')) {
                        d.classList.add('selected');
                    }
                });
                renderDayDiaries();
                const diaries = diaryData[dateStr] || [];
                const diary = diaries.find(d => d.id == diaryId);
                if (diary) {
                    document.getElementById('diaryContent').value = diary.content;
                }
            }, 100);
            
            document.getElementById('diaryDate').textContent = formatDate(dateStr);
        }

        function deleteDiary(dateStr, diaryId) {
            if (confirm('确定要删除这篇日记吗？')) {
                const diaries = diaryData[dateStr];
                const newDiaries = diaries.filter(d => d.id != diaryId);
                if (newDiaries.length === 0) {
                    delete diaryData[dateStr];
                } else {
                    diaryData[dateStr] = newDiaries;
                }
                localStorage.setItem('diaryData', JSON.stringify(diaryData));
                renderDiaryList();
                renderCalendar();
                if (selectedDate === dateStr) {
                    selectedDiaryId = null;
                    renderDayDiaries();
                }
            }
        }

        function deleteDayDiary(diaryId) {
            if (!selectedDate) return;
            deleteDiary(selectedDate, diaryId);
        }
        
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        
        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        
        document.getElementById('goToday').addEventListener('click', () => {
            currentDate = new Date();
            renderCalendar();
        });
        
        document.getElementById('saveBtn').addEventListener('click', saveDiary);
        
        document.getElementById('newDiaryBtn').addEventListener('click', () => {
            if (!selectedDate) {
                alert('请先选择一个日期');
                return;
            }
            selectedDiaryId = null;
            document.getElementById('diaryContent').value = '';
            renderDayDiaries();
            document.getElementById('diaryContent').focus();
        });
        
        renderCalendar();
    </script>
</body>
</html>
