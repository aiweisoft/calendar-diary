<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .main {
                grid-template-columns: 1fr;
            }
        }
        .calendar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header h2 {
            font-size: 1.2rem;
            color: #333;
        }
        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .calendar-header button:hover {
            background: #5568d3;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 10px;
        }
        .weekdays div {
            color: #999;
            font-size: 12px;
            padding: 8px 0;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .days div {
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }
        .days div:hover:not(.empty) {
            background: #f0f0f0;
        }
        .days div.today {
            background: #667eea;
            color: white;
        }
        .days div.selected {
            background: #764ba2;
            color: white;
        }
        .days div.has-diary {
            position: relative;
        }
        .days div.has-diary::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #764ba2;
            border-radius: 50%;
        }
        .days div.selected.has-diary::after {
            background: white;
        }
        .empty {
            cursor: default;
        }
        .diary-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .diary-panel h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }
        .diary-date {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .diary-content {
            width: 100%;
            height: 300px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            line-height: 1.6;
        }
        .diary-content:focus {
            outline: none;
            border-color: #667eea;
        }
        .save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            width: 100%;
        }
        .save-btn:hover {
            background: #5568d3;
        }
        .no-date {
            color: #999;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📔 日历日记</h1>
            <p>记录每一天的美好</p>
        </div>
        <div class="main">
            <div class="calendar">
                <div class="calendar-header">
                    <button id="prevMonth">◀</button>
                    <h2 id="currentMonth">2024年1月</h2>
                    <button id="nextMonth">▶</button>
                </div>
                <div class="weekdays">
                    <div>日</div>
                    <div>一</div>
                    <div>二</div>
                    <div>三</div>
                    <div>四</div>
                    <div>五</div>
                    <div>六</div>
                </div>
                <div class="days" id="days"></div>
            </div>
            <div class="diary-panel">
                <h2>日记内容</h2>
                <div class="diary-date" id="diaryDate">请选择一个日期</div>
                <textarea class="diary-content" id="diaryContent" placeholder="在这里写下今天的日记..."></textarea>
                <button class="save-btn" id="saveBtn">保存日记</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = null;
        const diaryData = JSON.parse(localStorage.getItem('diaryData') || '{}');

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            const daysContainer = document.getElementById('days');
            daysContainer.innerHTML = '';
            
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                daysContainer.appendChild(empty);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEl = document.createElement('div');
                dayEl.textContent = day;
                
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    dayEl.className = 'today';
                }
                
                if (diaryData[dateStr]) {
                    dayEl.classList.add('has-diary');
                }
                
                dayEl.addEventListener('click', () => selectDate(dateStr, dayEl));
                daysContainer.appendChild(dayEl);
            }
        }
        
        function selectDate(dateStr, element) {
            document.querySelectorAll('.days div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
            
            selectedDate = dateStr;
            document.getElementById('diaryDate').textContent = formatDate(dateStr);
            document.getElementById('diaryContent').value = diaryData[dateStr] || '';
        }
        
        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${year}年${parseInt(month)}月${parseInt(day)}日`;
        }
        
        function saveDiary() {
            if (!selectedDate) {
                alert('请先选择一个日期');
                return;
            }
            
            const content = document.getElementById('diaryContent').value;
            diaryData[selectedDate] = content;
            localStorage.setItem('diaryData', JSON.stringify(diaryData));
            
            renderCalendar();
            alert('日记已保存！');
        }
        
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        
        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        
        document.getElementById('saveBtn').addEventListener('click', saveDiary);
        
        renderCalendar();
    </script>
</body>
</html>
